# -- FILE: pytest.ini (or tox.ini)
[pytest]
DJANGO_SETTINGS_MODULE = core.test_settings
# -- recommended but optional:
python_files = tests.py test_*.py *_tests.py

[run]
omit =
    # Schließt alle Migrations-Ordner aus
    /migrations/
    # Schließt die Django-Konfigurationsdateien aus
    */wsgi.py
    */asgi.py
    manage.py
    */admin.py
      */__init__.py